<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explora nuestro catálogo de Magick blocks tipo pixbrix. Kits de armado, packs de colores y plantillas digitales descargables para mini bloques. Para regalar a tus hijos o pareja, fan de Pokémon, Dragon Ball, One Piece, Videojuegos y Anime.</title>
    <meta name="description" content="Descubre nuestros kits de armado, packs de colores y plantillas digitales de magickblocks pixbrix mini bloques. Construye tus figuras favoritas pieza a pieza.">
    <link rel="stylesheet" href="./styles.css">
    <!-- model-viewer: se carga dinámicamente solo cuando el usuario abre el visor 3D -->
</head>
<body>
    <header class="header">
    <div class="container">
        <h1 class="logo">
            <span class="visually-hidden">Catálogo de Productos</span>
        </h1>
        <!-- El tagline se elimina -->
    </div>
</header>

    <!-- ═══════════════════════════════════════════════════════
         BANNER DE ANUNCIOS
         Las imágenes van en /banner/ — config en banner.js
         ═══════════════════════════════════════════════════════ -->
    <section class="banner-section" aria-label="Anuncios y ofertas">
        <div id="bannerWrapper" class="banner-wrapper">
            <!-- Los slides se inyectan dinámicamente por banner.js -->
        </div>
    </section>

    <main class="main-content">
        <div class="container">
            <section class="filters">
                <label for="searchInput" class="visually-hidden">Buscar productos</label>
                <input type="text" id="searchInput" placeholder="Buscar productos..." class="search-box">
                <label for="categoryFilter" class="visually-hidden">Filtrar por categoría</label>
                <select id="categoryFilter" class="category-filter">
                    <option value="all">Todas las categorías</option>
                </select>
            </section>

            <section class="products-section">
                <h2 class="section-title">Nuestros Productos</h2>
                <div id="productsGrid" class="products-grid loading">
                    <!-- Loading spinner -->
                    <div class="loading-spinner">
                        <div class="spinner"></div>
                        <p>Cargando productos...</p>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Modal de Producto -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalBody" class="modal-body">
                <!-- El contenido del modal se cargará aquí -->
            </div>
        </div>
    </div>

    <!-- ✅ PANEL DEL CARRITO -->
    <div id="cartPanel" class="cart-panel minimized">
        <div class="cart-header" onclick="toggleCart()">
            <div class="cart-header-content">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span>Carrito de Compras</span>
                <span class="cart-badge" id="cartCount">0</span>
            </div>
            <span class="cart-toggle-icon">▲</span>
        </div>

        <div class="cart-body">
            <div id="emptyCartMessage" class="empty-cart">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <p>Tu carrito está vacío</p>
            </div>
            <div id="cartItems" class="cart-items">
                <!-- Los items del carrito se cargarán aquí -->
            </div>
        </div>

        <div id="cartFooter" class="cart-footer" style="display: none;">
            <div class="cart-subtotal">
                <span>Subtotal:</span>
                <span id="cartSubtotal" class="total-amount">$0.00</span>
            </div>
            <div class="cart-shipping">
                <span id="cartShippingLabel">Envío:</span>
                <span id="cartShipping" class="total-amount">$0.00</span>
            </div>
            <div class="cart-total cart-total-final">
                <span>Total:</span>
                <span id="cartTotal" class="total-amount">$0.00</span>
            </div>
            <button class="checkout-btn" onclick="checkout()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                Finalizar Compra
            </button>
            <button class="clear-cart-btn" onclick="clearCart()">Vaciar Carrito</button>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 Catálogo de Productos. Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- Visor 3D overlay (lazy) -->
    <div id="viewer3dOverlay" class="viewer3d-overlay" role="dialog" aria-modal="true" aria-label="Visor 3D">
        <div class="viewer3d-container">
            <button class="viewer3d-close" onclick="close3dViewer()" aria-label="Cerrar visor 3D">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
                <span>Cerrar</span>
            </button>
            <div id="viewer3dContent" class="viewer3d-content">
                <!-- model-viewer se inyecta aquí dinámicamente -->
            </div>
            <p class="viewer3d-hint">
                🖱️ Arrastra para rotar &nbsp;·&nbsp; 🔍 Scroll para zoom &nbsp;·&nbsp; Toca con dos dedos para mover
            </p>
        </div>
    </div>

    <script>window.STATIC_MODE = true;</script>
    <script src="./banner.js"></script>
    <script src="./script.js"></script>
</body>
</html>
